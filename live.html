<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Number 10 Sports — Live</title>
<style>
body{margin:0;font-family:Inter, Jost, sans-serif;background:#000;color:#fff}
.container{max-width:1200px;margin:28px auto;padding:0 16px}
.player-wrap{background:#000;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.04)}
.player-frame{width:100%;aspect-ratio:16/9;background:#000;display:flex;align-items:center;justify-content:center;position:relative}
.player-frame iframe{width:100%;height:100%;border:0;display:block}
.loading{position:absolute;left:0;right:0;top:0;bottom:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;background:linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0.25));}
.spinner{width:48px;height:48px;border-radius:50%;border:5px solid rgba(255,255,255,0.12);border-top-color:var(--sv-primary,#dc143c);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{padding:22px;text-align:center;color:#fff;background:#111;border-radius:8px;margin-top:18px}
.btn{display:inline-block;padding:12px 18px;border-radius:8px;background:var(--sv-primary,#dc143c);color:#fff;text-decoration:none;font-weight:700}
@media(max-width:600px){.container{margin:12px auto;padding:0 12px}}
</style>
</head>
<body>
<div class="container">
	<h1 style="font-size:22px;margin-bottom:12px">Live Stream</h1>
	<div class="player-wrap">
		<div class="player-frame" id="playerFrame">
			<div class="loading" id="playerLoading">
				<div class="spinner" aria-hidden="true"></div>
				<div id="loadingText">Loading Live Stream...</div>
			</div>
			<iframe id="livePlayer" title="Number 10 Sports live player" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
		</div>
	</div>
	<div id="playerError" class="error" style="display:none">Live stream currently unavailable. Please check back shortly.</div>
	<div style="margin-top:18px">
		<a href="index.html" class="btn">Back to Home</a>
	</div>
</div>

<script src="ott-config.js"></script>
<script>
(function(){
	// Read `stream` param or fall back to OTT_ID from ott-config.js
	function getStreamId(){
		try{
			var params = new URLSearchParams(window.location.search);
			var s = params.get('stream');
			return s || OTT_ID;
		}catch(e){
			return OTT_ID;
		}
	}

	var player = document.getElementById('livePlayer');
	var loading = document.getElementById('playerLoading');
	var errorBox = document.getElementById('playerError');
	var frame = document.getElementById('playerFrame');

	var streamId = getStreamId();
	var embedUrl = buildEmbedUrl(streamId) + '?autoplay=1&muted=0';

	var loadTimeout = setTimeout(function(){
		// If iframe hasn't fired load, show friendly error
		loading.style.display = 'none';
		errorBox.style.display = 'block';
	}, 15000);

	player.onload = function(){
		clearTimeout(loadTimeout);
		loading.style.display = 'none';
		errorBox.style.display = 'none';
	};

	// For some providers, onload may not fire reliably; still set src and rely on timeout
	try{
		player.src = embedUrl;
	}catch(e){
		console.error('Failed to set player src', e);
		loading.style.display = 'none';
		errorBox.style.display = 'block';
	}

	// Make player responsive and avoid horizontal scroll
	function preventScroll(){document.documentElement.style.overflowX='hidden';}
	preventScroll();

})();
</script>
</body>
</html>
